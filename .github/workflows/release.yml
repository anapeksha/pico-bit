name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag whose release assets will be replaced
        required: true
        type: string
      build_ref:
        description: Branch or commit to build from (defaults to main)
        required: false
        default: main
        type: string
      build_firmware:
        description: Build and publish the frozen UF2 firmware
        required: false
        default: true
        type: boolean
      build_agents:
        description: Build and publish the agent executables
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  # ── Frozen firmware ──────────────────────────────────────────────────────────
  build-uf2:
    name: Build Frozen UF2
    if: github.event_name != 'workflow_dispatch' || inputs.build_firmware
    runs-on: ubuntu-latest

    steps:
      - name: Validate manual release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          case "${{ inputs.release_tag }}" in
            v*) ;;
            *)
              echo "release_tag must start with v"
              exit 1
              ;;
          esac

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.build_ref || github.ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.14'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcc-arm-none-eabi libnewlib-arm-none-eabi ninja-build

      - name: Install Python dependencies
        run: uv sync

      - name: Install frontend dependencies
        run: npm ci --prefix web

      - name: Verify source tree
        run: |
          if [ -d scripts ]; then
            npm --prefix web run build
            npm --prefix web run check
            uv run python -c "from scripts.asset_pipeline import sync_web_assets; sync_web_assets(check=True)"
            uv run ruff check build.py release.py scripts src tests
          else
            uv run python -c "from asset_pipeline import sync_web_assets; sync_web_assets(check=True)"
            uv run ruff check asset_pipeline.py build.py build_support.py release.py src tests
          fi
          uv run pytest

      - name: Build frozen firmware
        run: |
          uv run python release.py build-uf2 \
            --micropython-ref v1.28.0 \
            --board RPI_PICO2_W \
            --release-version "${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pico-bit-uf2
          path: |
            dist/*.uf2
            dist/release.json

  # ── Agent binaries — native per OS + architecture runner ────────────────────
  build-agent-binaries:
    name: Build Agent (${{ matrix.platform }} ${{ matrix.arch }})
    if: github.event_name != 'workflow_dispatch' || inputs.build_agents
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_ext: exe
          - platform: windows
            arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_ext: exe
          - platform: linux
            arch: x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact_ext: bin
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact_ext: bin
          - platform: macos
            arch: x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact_ext: bin
          - platform: macos
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact_ext: bin
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.build_ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure MSVC environment
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
          key: ${{ matrix.platform }}-${{ matrix.arch }}

      - name: Install Zig
        if: matrix.platform == 'linux'
        run: pip3 install ziglang

      - name: Install cargo-zigbuild
        if: matrix.platform == 'linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build payloads on Windows
        if: matrix.platform == 'windows'
        working-directory: agent
        shell: pwsh
        run: |
          cargo build --release --target ${{ matrix.target }} --bin exfil
          cargo build --release --target ${{ matrix.target }} --bin persist
          cargo build --release --target ${{ matrix.target }} --bin wipe
          cargo build --release --target ${{ matrix.target }} --bin recon --features with-sysinfo

      - name: Build payloads on macOS/Linux
        if: matrix.platform != 'windows'
        working-directory: agent
        shell: bash
        run: |
          tool=build
          if [ "${{ matrix.platform }}" = "linux" ]; then
            tool=zigbuild
          fi
          cargo "$tool" --release --target "${{ matrix.target }}" --bin exfil
          cargo "$tool" --release --target "${{ matrix.target }}" --bin persist
          cargo "$tool" --release --target "${{ matrix.target }}" --bin wipe
          cargo "$tool" --release --target "${{ matrix.target }}" --bin recon --features with-sysinfo

      - name: Stage Windows artifacts
        if: matrix.platform == 'windows'
        working-directory: agent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          foreach ($bin in 'exfil', 'persist', 'wipe', 'recon') {
            Copy-Item "target/${{ matrix.target }}/release/$bin.exe" "dist/$bin-${{ matrix.arch }}.exe"
          }

      - name: Stage macOS/Linux artifacts
        if: matrix.platform != 'windows'
        working-directory: agent
        shell: bash
        run: |
          mkdir -p dist
          for bin in exfil persist wipe recon; do
            cp "target/${{ matrix.target }}/release/${bin}" "dist/${bin}-${{ matrix.arch }}.${{ matrix.artifact_ext }}"
          done

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.platform }}-${{ matrix.arch }}
          path: agent/dist/*
          if-no-files-found: error

  # ── Agent zip packaging ──────────────────────────────────────────────────────
  package-agent-zips:
    name: Package Agent Payload Zips
    needs: build-agent-binaries
    if: github.event_name != 'workflow_dispatch' || inputs.build_agents
    runs-on: ubuntu-latest

    steps:
      - name: Download staged agent binaries
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          path: agent-artifacts

      - name: Package per-platform zip archives
        run: |
          mkdir -p dist/windows dist/linux dist/macos
          find agent-artifacts/agent-windows-* -type f -exec cp {} dist/windows/ \;
          find agent-artifacts/agent-linux-* -type f -exec cp {} dist/linux/ \;
          find agent-artifacts/agent-macos-* -type f -exec cp {} dist/macos/ \;
          (
            cd dist
            zip -r payloads-windows.zip windows/
            zip -r payloads-linux.zip linux/
            zip -r payloads-macos.zip macos/
          )

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pico-bit-agent-zips
          path: dist/payloads-*.zip
          if-no-files-found: error

  # ── Publish release assets in one step ──────────────────────────────────────
  publish-release:
    name: Publish Release Assets
    needs:
      - build-uf2
      - package-agent-zips
    if: >
      always() &&
      !cancelled() &&
      (
        needs.build-uf2.result == 'success' ||
        needs.package-agent-zips.result == 'success'
      ) &&
      (
        needs.build-uf2.result == 'success' ||
        needs.build-uf2.result == 'skipped'
      ) &&
      (
        needs.package-agent-zips.result == 'success' ||
        needs.package-agent-zips.result == 'skipped'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.build_ref || github.ref }}

      - name: Download UF2 artifacts
        if: needs.build-uf2.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: pico-bit-uf2
          path: dist

      - name: Download agent zip artifacts
        if: needs.package-agent-zips.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: pico-bit-agent-zips
          path: dist

      - name: Refresh release.json checksums
        run: python3 release.py refresh-release-json

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: |
            dist/*.uf2
            dist/release.json
            dist/payloads-*.zip
