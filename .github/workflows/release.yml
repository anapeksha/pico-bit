name: Release Firmware

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FIRMWARE_TARGET: thumbv8m.main-none-eabihf
  PICOTOOL_VERSION: 2.3.0
  PICOTOOL_RELEASE_TAG: v2.3.0-0

jobs:
  package:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match v*.*.*"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build embedded web assets
        run: |
          npm ci --prefix web
          npm --prefix web run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.FIRMWARE_TARGET }}

      - name: Install ARM C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libudev-dev \
            libusb-1.0-0

      - name: Install firmware tools
        run: |
          cargo install flip-link --locked
          cargo install elf2uf2-rs --locked

      - name: Install picotool
        run: |
          case "$(uname -m)" in
            x86_64)
              asset="picotool-${PICOTOOL_VERSION}-x86_64-lin.tar.gz"
              sha256="d8222dbb04e83427bcaef8466fe6e76b0e0193c3a140029934bd365dae49f61f"
              ;;
            aarch64)
              asset="picotool-${PICOTOOL_VERSION}-aarch64-lin.tar.gz"
              sha256="90fc7e939a68f33b286f9fc4eaa58c11b49c4251c472d541c73d211ec28b8922"
              ;;
            *)
              echo "Unsupported runner architecture: $(uname -m)"
              exit 1
              ;;
          esac

          curl -fsSL \
            "https://github.com/raspberrypi/pico-sdk-tools/releases/download/${PICOTOOL_RELEASE_TAG}/${asset}" \
            -o "$RUNNER_TEMP/$asset"
          echo "$sha256  $RUNNER_TEMP/$asset" | sha256sum --check

          mkdir -p "$RUNNER_TEMP/picotool"
          tar -xzf "$RUNNER_TEMP/$asset" -C "$RUNNER_TEMP/picotool"
          echo "$RUNNER_TEMP/picotool/picotool" >> "$GITHUB_PATH"
          echo "picotool_DIR=$RUNNER_TEMP/picotool/picotool" >> "$GITHUB_ENV"

      - name: Build release firmware
        run: cargo build --release --target "$FIRMWARE_TARGET"

      - name: Sign and package firmware
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          PICOBIT_SIGNING_PRIVATE_KEY_B64: ${{ secrets.PICOBIT_SIGNING_PRIVATE_KEY_B64 }}
          PICOBIT_SIGNING_PUBLIC_KEY_B64: ${{ secrets.PICOBIT_SIGNING_PUBLIC_KEY_B64 }}
        run: |
          if [[ -z "$PICOBIT_SIGNING_PRIVATE_KEY_B64" ]]; then
            echo "Missing required GitHub secret: PICOBIT_SIGNING_PRIVATE_KEY_B64"
            exit 1
          fi
          if [[ -z "$PICOBIT_SIGNING_PUBLIC_KEY_B64" ]]; then
            echo "Missing required GitHub secret: PICOBIT_SIGNING_PUBLIC_KEY_B64"
            exit 1
          fi

          umask 077
          printf '%s' "$PICOBIT_SIGNING_PRIVATE_KEY_B64" | base64 --decode > "$RUNNER_TEMP/picobit-signing-private.pem"
          printf '%s' "$PICOBIT_SIGNING_PUBLIC_KEY_B64" | base64 --decode > "$RUNNER_TEMP/picobit-signing-public.pem"
          trap 'rm -f "$RUNNER_TEMP/picobit-signing-private.pem" "$RUNNER_TEMP/picobit-signing-public.pem" "$RUNNER_TEMP/picobit-signing-public-derived.pem" "$RUNNER_TEMP/firmware-$RELEASE_TAG.unsigned.elf"' EXIT

          openssl ec \
            -in "$RUNNER_TEMP/picobit-signing-private.pem" \
            -pubout \
            -out "$RUNNER_TEMP/picobit-signing-public-derived.pem"
          cmp "$RUNNER_TEMP/picobit-signing-public.pem" "$RUNNER_TEMP/picobit-signing-public-derived.pem"

          cp "target/$FIRMWARE_TARGET/release/pico-bit" "$RUNNER_TEMP/firmware-$RELEASE_TAG.unsigned.elf"

          picotool seal \
            --hash \
            --sign \
            "$RUNNER_TEMP/firmware-$RELEASE_TAG.unsigned.elf" \
            "firmware-$RELEASE_TAG.elf" \
            "$RUNNER_TEMP/picobit-signing-private.pem" \
            "$RUNNER_TEMP/firmware-$RELEASE_TAG.otp.json"

          elf2uf2-rs "firmware-$RELEASE_TAG.elf" "firmware-$RELEASE_TAG.uf2"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pico-bit-firmware
          path: |
            firmware-*.uf2
            firmware-*.elf

      - name: Attach firmware to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware-*.uf2
            firmware-*.elf
