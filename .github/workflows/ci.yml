name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: uv sync

      - name: Verify embedded web assets
        run: uv run python -c "from scripts.asset_pipeline import sync_web_assets; sync_web_assets(check=True)"

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run lint
        run: uv run ruff check build.py release.py scripts src tests

      - name: Run type checks
        run: uv run pyright

      - name: Run tests
        run: uv run pytest

      - name: Build dev artifacts
        run: uv run python build.py

      - name: Validate generated artifacts
        run: |
          uv run ruff format --check dist/boot.py
          uv run ruff check dist/boot.py
          uv run python -m py_compile dist/boot.py
          test -d dist/mpy
          find dist/mpy -name '*.mpy' | grep -q '.'
