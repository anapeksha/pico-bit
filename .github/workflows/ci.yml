name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.14'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: uv sync

      - name: Install frontend dependencies
        run: npm ci --prefix web

      - name: Build frontend assets
        run: npm --prefix web run build

      - name: Check frontend
        run: npm --prefix web run check

      - name: Verify embedded web assets
        run: uv run python -c "from scripts.asset_pipeline import sync_web_assets; sync_web_assets(check=True, skip_build=True)"

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run lint
        run: uv run ruff check build.py release.py scripts src tests

      - name: Run type checks
        run: uv run pyright

      - name: Run frontend tests
        run: npm --prefix web run test

      - name: Run tests
        run: uv run pytest

      - name: Build dev artifacts
        run: uv run python build.py --skip-frontend

      - name: Validate generated artifacts
        run: |
          uv run python -m py_compile dist/boot.py
          test dist/boot.mpy
          test -d dist/mpy
          find dist/mpy -name '*.mpy' | grep -q '.'
