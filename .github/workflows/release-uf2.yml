name: Release UF2

on:
  push:
    tags:
      - 'v*'

jobs:
  build-uf2:
    name: Build Frozen UF2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcc-arm-none-eabi libnewlib-arm-none-eabi ninja-build

      - name: Install Python dependencies
        run: poetry install --no-interaction

      - name: Verify source tree
        run: |
          poetry run python -c "from scripts.asset_pipeline import sync_web_assets; sync_web_assets(check=True)"
          poetry run ruff check build.py deploy.py scripts src tests
          poetry run pytest

      - name: Build frozen firmware
        run: poetry run python deploy.py build-uf2 --micropython-ref v1.28.0 --board RPI_PICO2_W

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pico-bit-uf2
          path: |
            dist/*.uf2
            dist/release.json

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.uf2
            dist/release.json
