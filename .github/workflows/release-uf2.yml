name: Release UF2

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to rebuild and upload assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-uf2:
    name: Build Frozen UF2
    runs-on: ubuntu-latest

    steps:
      - name: Validate manual release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          case "${{ inputs.release_tag }}" in
            v*) ;;
            *)
              echo "release_tag must start with v"
              exit 1
              ;;
          esac

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcc-arm-none-eabi libnewlib-arm-none-eabi ninja-build

      - name: Install Python dependencies
        run: poetry install --no-interaction

      - name: Patch historical build helpers
        run: |
          poetry run python - <<'PY'
          from pathlib import Path

          old_block = """    for source in source_modules(source_dir):
                  relative = source.relative_to(source_dir).with_suffix('.mpy')
                  output = output_dir / relative
                  output.parent.mkdir(parents=True, exist_ok=True)
                  subprocess.run([*compiler_cmd, str(source), '-o', str(output)], cwd=cwd, check=True)
                  compiled.append(output)
          """

          new_block = """    for source in source_modules(source_dir):
                  source_name = source.relative_to(source_dir).as_posix()
                  relative = source.relative_to(source_dir).with_suffix('.mpy')
                  output = output_dir / relative
                  output.parent.mkdir(parents=True, exist_ok=True)
                  subprocess.run(
                      [*compiler_cmd, '-s', source_name, '-o', str(output), str(source)],
                      cwd=cwd,
                      check=True,
                  )
                  compiled.append(output)
          """

          for candidate in (Path('scripts/build_support.py'), Path('build_support.py')):
              if not candidate.exists():
                  continue

              text = candidate.read_text(encoding='utf-8')
              if 'source_name = source.relative_to(source_dir).as_posix()' in text:
                  print(f'{candidate}: already patched')
                  continue

              if old_block not in text:
                  raise SystemExit(f'Could not patch {candidate}: expected block not found')

              candidate.write_text(text.replace(old_block, new_block), encoding='utf-8')
              print(f'{candidate}: patched')
          PY

      - name: Verify source tree
        run: |
          if [ -d scripts ]; then
            poetry run python -c "from scripts.asset_pipeline import sync_web_assets; sync_web_assets(check=True)"
            poetry run ruff check build.py deploy.py scripts src tests
          else
            poetry run python -c "from asset_pipeline import sync_web_assets; sync_web_assets(check=True)"
            poetry run ruff check asset_pipeline.py build.py build_support.py deploy.py src tests
          fi
          poetry run pytest

      - name: Build frozen firmware
        run: poetry run python deploy.py build-uf2 --micropython-ref v1.28.0 --board RPI_PICO2_W

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pico-bit-uf2
          path: |
            dist/*.uf2
            dist/release.json

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: |
            dist/*.uf2
            dist/release.json
