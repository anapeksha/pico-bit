<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Unlock Pico Bit injector portal." />
    <title>Unlock Injector</title>
    <link rel="stylesheet" href="/portal.css" />
  </head>
  <body class="login-body">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">Pico Bit</h1>
        <p class="login-hint">Sign in to unlock injector.</p>
      </div>

      <form action="/login" method="post" class="login-form">
        <div class="notice {{message_class}}" role="alert">{{message}}</div>

        <div class="field">
          <label class="field__label" for="username">Username</label>
          <input
            class="field__input"
            id="username"
            name="username"
            autocomplete="username"
            value="{{username}}"
            required
          />
        </div>
        <div class="field">
          <label class="field__label" for="password">Password</label>
          <input
            class="field__input"
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>
        <button class="btn btn--primary btn--wide" type="submit">
          <svg
            class="btn__icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 9.2-1"></path>
          </svg>
          Unlock
        </button>
      </form>
    </div>
  </body>
</html>
