<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      name="description"
      content="Sign in to the Pico Bit injector portal on Raspberry Pi Pico 2 W."
    />
    <title>Pico Bit Injector · Sign in</title>
    <link rel="stylesheet" href="/assets/portal.css" />
  </head>
  <body class="login-body">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">Pico Bit</h1>
        <p class="login-hint">
          Connect to <strong>{{ap_ssid}}</strong> then sign in.
        </p>
      </div>

      <form action="/login" method="post" class="login-form">
        <div class="notice {{message_class}}">{{message}}</div>

        <div class="field">
          <label class="field__label" for="username">Username</label>
          <input
            class="field__input"
            id="username"
            name="username"
            autocomplete="username"
            value="{{username}}"
            required
          />
        </div>
        <div class="field">
          <label class="field__label" for="password">Password</label>
          <input
            class="field__input"
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>
        <button class="btn btn--primary btn--wide" type="submit">
          Unlock injector
        </button>
      </form>
    </div>
  </body>
</html>
